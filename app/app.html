// ── Root com autenticação ──────────────────────────────────────────────────────
function Root(){
  const [user,         setUser]         = useState(undefined);
  const [familyId,     setFamilyId]     = useState(null);
  const [familyNome,   setFamilyNome]   = useState("");
  const [familyPlan,   setFamilyPlan]   = useState("basico"); // basico | pro | familia | anual
  const [planStatus,   setPlanStatus]   = useState("ativa");  // ativa | pendente | cancelada
  const [familyLifetime,setFamilyLifetime]=useState(false);
  const [familyBillingType,setFamilyBillingType]=useState("");
  const [codigoNovo,   setCodigoNovo]   = useState(null);
  const [authLoading,  setAuthLoading]  = useState(true);
  const [showRegister, setShowRegister] = useState(()=>{const q=location.search.toLowerCase();return q.includes("cadastro=1")||q.includes("criarfamilia=1")||q.includes("plano=free");});
  const [isAdmin,      setIsAdmin]      = useState(false);
  const [emailConfirmResult, setEmailConfirmResult] = useState(null);

  useEffect(()=>{
    const unsub = onAuthStateChanged(auth, async u=>{
      if(u){
        try{
          const userDoc = await getDoc(doc(usersCol, u.uid));
          if(userDoc.exists()){
            const fid = userDoc.data().familyId;
            setFamilyId(fid);
            const famDoc = await getDoc(doc(familiesCol, fid));
            if(famDoc.exists()){
              const fd = famDoc.data();
              const ownerLifetime = fd.lifetime === true || fd.ownerPlan === true || fd.billingType === "owner" || fd.billingType === "lifetime";
              setFamilyNome(fd.nome||"");
              setIsAdmin(fd.adminUid === u.uid);
              setFamilyPlan(ownerLifetime ? "familia" : (fd.plan||fd.plano||"basico"));
              setPlanStatus(ownerLifetime ? "ativa" : (fd.planStatus||"ativa"));
              setFamilyLifetime(ownerLifetime);
              setFamilyBillingType(fd.billingType || (ownerLifetime ? "lifetime" : ""));
            }
          }
        } catch(err){ console.error(err); }
      } else {
        setFamilyId(null); setFamilyNome(""); setCodigoNovo(null);
        setFamilyPlan("pro"); setPlanStatus("ativa"); setFamilyLifetime(false); setFamilyBillingType("");
      }
      setUser(u); setAuthLoading(false);
    });
    return unsub;
  },[]);

  useEffect(()=>{
    let token = "";
    try {
      const params = new URLSearchParams(window.location.search);
      if(params.get("confirmacao") === "laviapp") token = params.get("token") || "";
    } catch(e) {}
    if(!token) return;
    let alive = true;
    setEmailConfirmResult({status:"checking",title:"Confirmando e-mail",message:"Estamos validando seu link de confirmacao."});
    (async()=>{
      try {
        const result = await confirmLaviAppEmailVerificationToken(token);
        try {
          if(auth.currentUser){
            await reload(auth.currentUser);
            setUser(auth.currentUser);
          }
        } catch(e) {}
        try {
          const url = new URL(window.location.href);
          url.searchParams.delete("token");

// ── Segurança local: Biometria/Passkey integrada ao login Firebase ───────────
function secKey(uid){ return "lavinia_security_"+uid; }
function secUnlockKey(uid){ return "lavinia_unlocked_"+uid; }
// Unlock por sessão: apaga ao fechar o app, pede biometria toda abertura
function isUnlockValid(uid){ return sessionStorage.getItem(secUnlockKey(uid))==="1"; }
function saveUnlock(uid){ sessionStorage.setItem(secUnlockKey(uid),"1"); }
function removeUnlock(uid){ sessionStorage.removeItem(secUnlockKey(uid)); }

function getSecurityConfig(uid){
  try { return JSON.parse(localStorage.getItem(secKey(uid))||"{}"); } catch { return {}; }
}
function saveSecurityConfig(uid,cfg){
  // Salva no localStorage (principal)
  localStorage.setItem(secKey(uid), JSON.stringify(cfg||{}));
  // Salva no Firestore como backup (não bloqueia)
  try {
    if(window._db && window._usersCol){
      updateDoc(doc(window._db, "users", uid), {
        secConfig: JSON.stringify(cfg||{}),
        secUpdatedAt: Date.now(),
      }).catch(()=>{});
    }
  } catch(e){}
}
// Tenta restaurar config do Firestore se localStorage estiver vazio
async function restoreSecurityConfig(uid){
  try {
    const existing = getSecurityConfig(uid);
    if(existing.credentialId) return existing; // já tem no localStorage
    // Busca backup no Firestore
    const snap = await getDoc(doc(window._db, "users", uid));
    if(snap.exists() && snap.data().secConfig){
      const cfg = JSON.parse(snap.data().secConfig||"{}");
      if(cfg.credentialId){
        localStorage.setItem(secKey(uid), JSON.stringify(cfg));
        console.log("[Bio] Config restaurada do Firestore ✓");
        return cfg;
      }
    }
  } catch(e){}
  return getSecurityConfig(uid);
}
function encodePin(pin){ return btoa(unescape(encodeURIComponent("lavinia:"+String(pin)))); }
function pinOk(uid,pin){ const cfg=getSecurityConfig(uid); return !!cfg.pinHash && cfg.pinHash===encodePin(pin); }
function randChallenge(){ const a=new Uint8Array(32); crypto.getRandomValues(a); return a; }
function bufToB64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b64ToBuf(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
function canUseBiometrics(){ return !!(window.isSecureContext && navigator.credentials && window.PublicKeyCredential); }
async function registerBiometricForUser(user){
  if(!canUseBiometrics()) throw new Error("A biometria precisa de HTTPS. Publique o app no Firebase Hosting ou Netlify para ativar.");
  const challenge = randChallenge();
  const cred = await navigator.credentials.create({publicKey:{
    challenge,
    rp:{name:"LaviApp"},
    user:{id:new TextEncoder().encode(user.uid), name:user.email||"usuario", displayName:user.email||"Usuário LaviApp"},
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{userVerification:"required", residentKey:"preferred"},
    timeout:60000,
    attestation:"none"
  }});
  const cfg=getSecurityConfig(user.uid);
  cfg.enabled=true;
  cfg.biometricEnabled=true;
  cfg.credentialId=bufToB64(cred.rawId);
  cfg.updatedAt=new Date().toISOString();
  saveSecurityConfig(user.uid,cfg);
  return true;
}
async function unlockWithBiometric(user){
  const cfg=getSecurityConfig(user.uid);
  if(!cfg.biometricEnabled || !cfg.credentialId) throw new Error("Biometria ainda não ativada.");
  if(!canUseBiometrics()) throw new Error("Biometria disponível apenas com HTTPS.");
  await navigator.credentials.get({publicKey:{
    challenge:randChallenge(),
    allowCredentials:[{type:"public-key",id:b64ToBuf(cfg.credentialId)}],
    userVerification:"required",
    timeout:60000
  }});
  saveUnlock(user.uid);
  return true;
}

function SecurityGate({user, children}){
  const [cfg,setCfg]    = React.useState(()=>getSecurityConfig(user.uid));
  const [locked,setLocked] = React.useState(()=>!!getSecurityConfig(user.uid).enabled && !isUnlockValid(user.uid));
  const [pin,setPin]    = React.useState("");
  const [msg,setMsg]    = React.useState("");
  const [busy,setBusy]  = React.useState(false);

  // Tenta restaurar config do Firestore se localStorage estiver vazio
  React.useEffect(()=>{
    restoreSecurityConfig(user.uid).then(restored=>{
      setCfg(restored);
      setLocked(!!restored.enabled && !isUnlockValid(user.uid));
    });
    const sync=()=>{ const c=getSecurityConfig(user.uid); setCfg(c); setLocked(!!c.enabled && !isUnlockValid(user.uid)); };
    window.addEventListener("lavinia-security-updated",sync);
    return ()=>window.removeEventListener("lavinia-security-updated",sync);
  },[user.uid]);

  function unlockPin(){
    if(pinOk(user.uid,pin)){
      saveUnlock(user.uid);
      setLocked(false); setMsg(""); setPin("");
    } else setMsg("Senha do app incorreta.");
  }
  async function unlockBio(){
    setBusy(true); setMsg("");
    try{ await unlockWithBiometric(user); setLocked(false); }
    catch(err){ setMsg((err.message||"Não foi possível desbloquear com biometria.")+" Como alternativa, saia e entre novamente com e-mail e senha."); }
    finally{ setBusy(false); }
  }

  if(!locked) return children;
  return e("div",{style:{minHeight:"100vh",background:"radial-gradient(circle at top,#20203A 0%,#0F0F1A 55%,#090913 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:24,color:"#F0EDE8"}},
    e("div",{style:{width:"100%",maxWidth:390,background:"#16162A",border:"1px solid #2A2A40",borderRadius:28,padding:"30px 24px",boxShadow:"0 28px 70px #00000088",textAlign:"center"}},

      e("div",{style:{fontFamily:BRAND.font,fontSize:26,fontWeight:800,color:"#F1F5F9",letterSpacing:"-0.045em",margin:0,lineHeight:1}},"Lavi",e("span",{style:{color:BRAND.teal}},"App")),

      (cfg.biometricEnabled||canUseBiometrics())&&e("button",{onClick:unlockBio,disabled:busy,style:{width:"100%",padding:"15px",borderRadius:16,background:"linear-gradient(135deg,#4ECDC4,#2EAF9F)",border:"none",color:"#0F0F1A",fontFamily:"inherit",fontWeight:800,fontSize:14,cursor:busy?"not-allowed":"pointer",marginBottom:12}},busy?"Aguardando...":"⌘ Entrar com digital / Face ID"),

      cfg.pinHash&&e("input",{type:"password",inputMode:"numeric",value:pin,onChange:ev=>setPin(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&unlockPin(),placeholder:"Senha antiga do app",style:{...S.inp,textAlign:"center",fontSize:18,letterSpacing:3,marginBottom:10}}),
      msg&&e("div",{style:{background:"#FF6B6B18",border:"1px solid #FF6B6B44",borderRadius:12,padding:"9px 12px",fontSize:12,color:"#FF6B6B",marginBottom:10}},msg),
      cfg.pinHash&&e("button",{onClick:unlockPin,style:{width:"100%",padding:"13px",borderRadius:16,background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",border:"none",color:"#fff",fontFamily:"inherit",fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:10}},"Entrar com senha antiga"),

    )
  );
}

function SecuritySettings({user}){
  const [cfg,setCfg] = React.useState(()=>getSecurityConfig(user.uid));

    if(pin!==pin2) return setMsg("As senhas não conferem.");
    const next={...cfg,enabled:true,pinHash:encodePin(pin),updatedAt:new Date().toISOString()};

  );

function FamiliaView({familyId, familyNome, user}){

  const [salvando,   setSalvando]   = useState(false);

  const [novoMembro, setNovoMembro] = useState("");

  useEffect(()=>{
    getDoc(doc(familiesCol, familyId)).then(d=>{
      if(d.exists()){ setFamData(d.data()); setNovoNome(d.data().nome||""); }
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[familyId]);

  useEffect(()=>{
    const unsub = onSnapshot(query(familyCol(familyId,"members"), orderBy("createdAt","asc")), snap=>{
      setCadMembers(snap.docs.map(d=>({id:d.id,...d.data()})));
    }, ()=>{});
    return ()=>unsub();
  },[familyId]);

  useEffect(()=>{
    const unsub = onSnapshot(query(familyCol(familyId,"categoryItems"), orderBy("createdAt","asc")), snap=>{
      setCatItems(snap.docs.map(d=>({id:d.id,...d.data()})));
    }, ()=>{});
    return ()=>unsub();
  },[familyId]);

  useEffect(()=>{
    const unsub = onSnapshot(query(familyCol(familyId,"categories"), orderBy("createdAt","asc")), snap=>{
      const cats = snap.docs.map(d=>({id:d.id,...d.data()}));
      syncCustomCategoriesGlobal(cats);
      setCadCats(cats);
    }, ()=>{});
    return ()=>unsub();
  },[familyId]);

  const isAdmin = famData?.adminUid === user?.uid;

  async function salvarEdicao(){
    if(!novoNome.trim()){ setMsg("O nome não pode ser vazio."); return; }
    setSalvando(true); setMsg("");
    try {
      await updateDoc(doc(familiesCol, familyId), {nome: novoNome.trim()});
      setFamData(f=>({...f, nome: novoNome.trim()}));
      setEditando(false);
      setMsg("✓ Nome atualizado com sucesso!");
      setTimeout(()=>setMsg(""),3000);
    } catch(err){ setMsg("× Erro: "+err.message); }
    finally{ setSalvando(false); }
  }

  async function excluirFamilia(){
    if(!isAdmin){ setMsg("Apenas o administrador pode excluir a família."); return; }
    const confirmado = prompt('Para confirmar a exclusão, digite o nome da família: "'+famData?.nome+'"');
    if(confirmado?.trim() !== famData?.nome){ setMsg("Nome incorreto. Exclusão cancelada."); return; }
    setSalvando(true); setMsg("Excluindo dados...");
    try {
      // Apagar subcoleções
      const cols=["expenses","incomes","bills","debts","acpag","members"];
      for(const c of cols){
        const snap = await getDocs(familyCol(familyId,c));
        for(const d of snap.docs) await deleteDoc(d.ref);
      }
      // Apagar config
      try{ await deleteDoc(familyDoc(familyId,"config","goals")); }catch{}
      // Remover familyId dos membros
      for(const m of (famData?.membros||[])){
        try{ await updateDoc(doc(usersCol,m.uid),{familyId:"",role:""}); }catch{}
      }
      // Apagar família
      await deleteDoc(doc(familiesCol, familyId));
      // Sair
      await signOut(auth);
    } catch(err){ setMsg("× Erro ao excluir: "+err.message); setSalvando(false); }
  }

  async function removerMembro(mUid){
    if(!isAdmin){ setMsg("Apenas o administrador pode remover membros."); return; }
    if(mUid===user.uid){ setMsg("Você não pode remover a si mesmo."); return; }
    if(!confirm("Remover este membro da família?")) return;
    try {
      const membros = famData.membros.filter(m=>m.uid!==mUid);
      await updateDoc(doc(familiesCol,familyId),{membros});
      await updateDoc(doc(usersCol,mUid),{familyId:"",role:""});
      setFamData(f=>({...f,membros}));
      setMsg("✓ Membro removido.");
      setTimeout(()=>setMsg(""),3000);
    } catch(err){ setMsg("× Erro: "+err.message); }
  }

  async function salvarMembroCadastro(){
    const nome = (editMembro ? editMembro.nome : novoMembro).trim();
    if(!nome){ setMsg("Informe o nome do membro."); return; }

  async function salvarCategoriaCadastro(){
    const atual = editCat || novaCat;
    const label = (atual.label||atual.nome||"").trim();
    const icon  = (atual.icon||"⌖").trim() || "⌖";
    const color = (atual.color||"#FFB347").trim() || "#FFB347";
    if(!label){ setMsg("Informe o nome da nova categoria."); return; }
    const labelLower = label.toLowerCase();
    const repetidoPadrao = CATEGORIES.some(c=>BASE_CATEGORY_IDS.includes(c.id) && c.label.toLowerCase()===labelLower);
    const repetidoCustom = cadCats.some(c=>(c.label||c.nome||"").trim().toLowerCase()===labelLower && c.id !== editCat?.id);
    if(repetidoPadrao || repetidoCustom){ setMsg("Esta categoria já existe."); return; }
    setSalvando(true); setMsg("");
    try{
      if(editCat){
        await updateDoc(familyDoc(familyId,"categories",editCat.id),{label,icon,color,updatedAt:new Date().toISOString()});
        setEditCat(null);
        setMsg("✓ Categoria atualizada!");
      }else{
        let catId = "cat_"+slugifyCat(label);
        if(CATEGORIES.some(c=>c.id===catId) || cadCats.some(c=>c.catId===catId)) catId = catId+"_"+Date.now().toString().slice(-4);
        await addDoc(familyCol(familyId,"categories"),{catId,label,icon,color,createdAt:new Date().toISOString()});
        setNovaCat({label:"",icon:"⌖",color:"#FFB347"});
        setMsg("✓ Nova categoria cadastrada!");

      setTimeout(()=>setMsg(""),2500);
    }catch(err){ setMsg("× Erro: "+err.message); }
    finally{ setSalvando(false); }
  }

    if(!confirm("Isso vai copiar todos os dados antigos para sua família. Continuar?")) return;
    setMigrating(true); setMigMsg("Buscando dados antigos...");
    try {
      const cols = ["expenses","incomes","bills"];
      let total  = 0;
      for(const colName of cols){
        const oldCol = collection(db, colName);
        const newCol = familyCol(familyId, colName);
        const snap   = await getDocs(oldCol);
        setMigMsg(`Migrando ${colName} (${snap.docs.length} registros)...`);
        for(const d of snap.docs){ await addDoc(newCol, {...d.data()}); total++; }
      }
      setMigMsg(`✓ ${total} registros migrados com sucesso!`);
    } catch(err){
      setMigMsg("× Erro na migração: "+err.message);
    } finally{ setMigrating(false); }

// Helper: renderiza ícone SVG inline com tamanho e cor customizados
function ico(name, size=16, color="currentColor"){
  return {dangerouslySetInnerHTML:{__html:svgIcon(name)
    .replace(/width="24" height="24"/g,`width="${size}" height="${size}"`)
    .replace(/currentColor/g, color)
  }};
}

function getBankPreset(idOrLabel){
  const raw = String(idOrLabel||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return CARD_BANKS.find(b=>b.id===idOrLabel || b.label.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")===raw) || CARD_BANKS[CARD_BANKS.length-1];
}

function getCardBrandPreset(idOrLabel){
  const raw = String(idOrLabel||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return CARD_BRANDS.find(b=>b.id===idOrLabel || b.label.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")===raw) || CARD_BRANDS[CARD_BRANDS.length-1];
}

  const b = getBankPreset(bank);
  return e("span",{className:"lavi-bank-badge",title:b.label,style:{background:b.bg,color:b.fg,width:opts.width||36,height:opts.height||30,fontSize:opts.fontSize||10}},b.short);

function CardBrandBadge(brand, opts={}){
  const b = getCardBrandPreset(brand);
  const baseStyle = {minWidth:opts.width||52,height:opts.height||28,fontSize:opts.fontSize};
  if(b.id==="visa"){
    return e("span",{className:"lavi-card-brand-badge visa",title:b.label,style:baseStyle},"VISA");
  }
  if(b.id==="mastercard"){
    return e("span",{className:"lavi-card-brand-badge mastercard",title:b.label,style:baseStyle},e("i",null),e("i",null));
  }
  if(b.id==="elo"){
    return e("span",{className:"lavi-card-brand-badge elo",title:b.label,style:baseStyle},e("b",null,"elo"),e("i",null),e("i",null),e("i",null));
  }
  if(b.id==="amex"){
    return e("span",{className:"lavi-card-brand-badge amex",title:b.label,style:baseStyle},e("span",null,"AMERICAN"),e("span",null,"EXPRESS"));
  }
  if(b.id==="hipercard"){
    return e("span",{className:"lavi-card-brand-badge hipercard",title:b.label,style:baseStyle},"Hiper",e("b",null,"card"));
  }
  return e("span",{className:"lavi-card-brand-badge generic",title:b.label,style:{...baseStyle,fontSize:opts.fontSize||11}},b.mark);
}

      if(d.getFullYear() === limiteAno && d.getMonth() === limiteMes){

        if(limiteMes === curMonth) return d <= now;

      if(d.getFullYear() < curYear) return true;
      if(d.getFullYear() === curYear && d.getMonth() < filterMonth) return true;
      if(d.getFullYear() === curYear && d.getMonth() === filterMonth){
        if(filterMonth === curMonth) return d <= now; // mês atual: até hoje
        return true; // mês passado: todo o mês
      }
      return false;
    };

    const map = {};
    incomes.filter(memberOk).filter(ateLimite).forEach(i=>{
      const d = new Date(i.date+"T00:00:00");
      const key = d.getFullYear()+"-"+String(d.getMonth()).padStart(2,"0");

      if(!map[key]) map[key]={year:d.getFullYear(),month:d.getMonth(),renda:0,gastos:0};
      map[key].gastos += e.amount;
    });
    const sorted = Object.values(map).sort((a,b)=> a.year!==b.year ? a.year-b.year : a.month-b.month);
    let acum = 0;
    return sorted.map(m=>{

  async function restoreBackupAppend(){

    if(backupRestoreMode!=="append") return notify("Por segurança, esta versão restaura apenas adicionando dados, sem apagar os atuais.");

    if(!ok) return;
    setSyncing(true);
    try{
      const strip = obj => { const {id, ...rest} = obj||{}; return {...rest,restoredAt:Date.now(),restoredFromBackup:true}; };
      const addMany = async (colRef, arr=[]) => { let n=0; for(const item of (Array.isArray(arr)?arr:[])){ await addDoc(colRef, strip(item)); n++; } return n; };
      const d=payload.data||{}; const cfg=payload.config||{};
      let total=0;
      total += await addMany(expCol,d.expenses);
      total += await addMany(incCol,d.incomes);
      total += await addMany(fbCol,d.fixedBills);
      total += await addMany(billsCol,d.bills);
      total += await addMany(debtsCol,d.debts);
      total += await addMany(finCol,d.fins);
      total += await addMany(acpagCol,d.acpag);
      total += await addMany(invCol,d.investments);
      total += await addMany(tripsCol,d.trips);
      total += await addMany(valeCol,d.valeAlimentacao);
      total += await addMany(creditAdjCol,d.creditAdjustments);

  function isCofrinhoPayment(pagamento){
    const p = String(pagamento||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    return p === "cofrinho" || p === "cofrinhos" || p.includes("cofrinho");
  }

  function findCofrinhoInvestment(member){
    const norm = v => String(v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const lista = investments.filter(inv=>
      norm(inv.tipo).includes("cofrinho") || norm(inv.nome).includes("cofrinho") || norm(inv.desc).includes("cofrinho")
    );
    if(lista.length===0) return null;
    return lista.find(inv=>inv.member===member)
        || lista.find(inv=>inv.member==="Família")
        || lista.find(inv=>!inv.member)
        || lista[0];
  }

  async function ajustarSaldoCofrinho(valor, member, operacao, origem="pagamento_cofrinho"){
    const inv = findCofrinhoInvestment(member);
    if(!inv) throw new Error("Nenhum cofrinho cadastrado em Investimentos.");
    const valorMov = parseFlexibleAmount(valor);
    const atual = parseFlexibleAmount(inv.valor!==undefined ? inv.valor : inv.amount);
    const ajuste = operacao === "creditar" ? valorMov : -valorMov;
    const novoValor = +(atual + ajuste).toFixed(2);
    const payload = {
      valor: novoValor,
      ultimaAtualizacao: todayISO(),
      ultimoMovimentoCofrinho: {
        tipo: operacao,
        valor: valorMov,
        saldoAnterior: atual,
        saldoAtual: novoValor,
        data: todayISO(),
        origem,
      }
    };
    // Compatibilidade com versões antigas que possam ter salvo o campo como amount
    if(inv.amount!==undefined) payload.amount = novoValor;
    await updateDoc(doc(db,"families",familyId,"investments",inv.id), payload);
    return {inv, novoValor};
  }


  function isCreditoPayment(pagamento){
    const p = String(pagamento||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    return p === "credito" || p.includes("cartao_credito") || p.includes("cartao de credito") || p.includes("credito");
  }

  function findCreditoInvestment(member){
    const norm = v => String(v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const lista = investments.filter(inv=>{
      const tipo = norm(inv.tipo);
      const nome = norm(inv.nome || inv.desc);
      return tipo.includes("cartao_credito") || tipo.includes("credito") || nome.includes("cartao") || nome.includes("credito");
    });
    if(lista.length===0) return null;
    return lista.find(inv=>inv.member===member)
        || lista.find(inv=>inv.member==="Família")
        || lista.find(inv=>!inv.member)
        || lista[0];
  }

  async function addExpense(){
    // Membros da família também podem adicionar gastos. Edição/exclusão continuam protegidas por adminGuard.
    // Validação dos campos obrigatórios
    if(!form.item?.trim()){ notify("! Informe o Item/Produto (obrigatório)."); return; }
    if(!form.local?.trim()){ notify("! Informe o Local da Compra (obrigatório)."); return; }
    if(!form.amount||isNaN(parseMasked(form.amount))){ notify("! Informe o Valor (obrigatório)."); return; }
    const tipoCartao = paymentCardType(form.pagamento);
    const cardOptions = tipoCartao ? cardsForPayment(form.pagamento) : [];
    const selectedCard = tipoCartao ? getCardById(form.cardId) : null;
    if(tipoCartao && cardOptions.length>0 && !selectedCard){
      notify("Escolha o cartão usado nesta compra.");
      return;
    }
    // Usa item como desc se desc não foi preenchida
    if(!form.desc) setForm(f=>({...f,desc:f.item}));
    const total   = parseMasked(form.amount);
    const parcelas = form.pagamento==="credito" ? Math.max(1,parseInt(form.parcelas)||1) : 1;
    const valorParcela = +(total/parcelas).toFixed(2);
    // Ajuste de centavos na última parcela
    const valorUltima  = +(total - valorParcela*(parcelas-1)).toFixed(2);
    if(isCofrinhoPayment(form.pagamento) && !findCofrinhoInvestment(form.member)){
      notify("Cadastre um investimento do tipo Cofrinho antes de pagar com Cofrinho.");
      return;
    }
    if(false && isCreditoPayment(form.pagamento) && !findCreditoInvestment(form.member)){
      notify("Compra registrada na fatura do cartão de crédito.");
      return;
    }
    setSyncing(true);
    try {
      const baseDate = new Date(form.date+"T00:00:00");
      for(let i=0;i<parcelas;i++){
        const d = new Date(baseDate);
        d.setMonth(d.getMonth()+i);
        const dateStr = d.toISOString().split("T")[0];
        const isLast  = i===parcelas-1;
        const descBase = form.desc?.trim() || form.item?.trim() || "";
        const descParc = parcelas>1 ? `${descBase} (${i+1}/${parcelas})` : descBase;
        const valorLancado = isLast ? valorUltima : valorParcela;
        await addDoc(expCol,{
          desc:      descParc,
          item:      (form.item||"").trim(),
          local:     (form.local||"").trim(),
          amount:    valorLancado,
          category:  form.category,
          member:    form.member,
          pagamento: form.pagamento,
          cardId:    selectedCard?.id || "",
          cardTipo:  selectedCard?.tipo || tipoCartao,
          cardBanco: selectedCard ? cardBankLabel(selectedCard) : "",
          cardBandeira:selectedCard ? cardBrandLabel(selectedCard) : "",
          cardFinal: selectedCard ? cardLast4(selectedCard) : "",
          tripId:    form.tripId || "",
          parcelas:  parcelas,
          parcelaNum:i+1,
          totalOriginal: total,
          date:      dateStr,
          createdAt: Date.now()+i,
        });
        if(isCofrinhoPayment(form.pagamento)){
          await ajustarSaldoCofrinho(valorLancado, form.member, "debitar");
        }
        if(isCreditoPayment(form.pagamento)){
          await ajustarSaldoCredito(valorLancado, form.member, "debitar", parcelas>1?"compra_parcelada_credito":"compra_credito");
        }
      }
      setForm(initForm);
      notify(parcelas>1 ? `${parcelas}x de ${fmt(valorParcela)} lançadas na fatura! ✓` : (isCreditoPayment(form.pagamento)?"Compra registrada na fatura! ✓":"Gasto adicionado! ✓"));
      setView("dashboard");
    } catch(e){ notify("Erro ao salvar: "+(e.message||"verifique o Cofrinho.")); } finally{ setSyncing(false); }
  }

  async function delExpense(id){
    if(!adminGuard("apagar gastos")) return;
    if(!confirmDel("Apagar este gasto?\n\nSe for uma parcela de dívida, o contador será revertido.")) return;
    try{
      // Verificar se o gasto está vinculado a uma dívida ou financiamento
      const exp = expenses.find(e=>e.id===id);
      if(exp?.debtId){
        // Reverter o parcelasPagas da dívida
        const debt = debts.find(d=>d.id===exp.debtId);
        if(debt && debt.parcelasPagas>0){
          await updateDoc(doc(db,"families",familyId,"debts",exp.debtId),{
            parcelasPagas:  Math.max(0, debt.parcelasPagas-1),
            ultimoPagamento: "",
            status: "pendente",
          });
        }
      }
      if(exp?.finId){
        const fin = fins.find(f=>f.id===exp.finId);
        if(fin && fin.parcelasPagas>0){
          await updateDoc(doc(db,"families",familyId,"financiamentos",exp.finId),{
            parcelasPagas: Math.max(0, fin.parcelasPagas-1),
          });
        }
      }
      await deleteDoc(doc(db,"families",familyId,"expenses",id));
      if(isCofrinhoPayment(exp?.pagamento)){
        try{ await ajustarSaldoCofrinho(exp.amount, exp.member, "creditar"); }catch{}
      }
      if(isCreditoPayment(exp?.pagamento)){
        try{ await ajustarSaldoCredito(exp.amount, exp.member, "creditar", "apagar_gasto_credito"); }catch{}
      }
      logActivity("Apagou gasto", "Gasto removido e parcela revertida", "Gastos"); notify("Gasto apagado e parcela revertida! ✓");
    }catch(e){ notify("Erro ao apagar: "+e.message); }
  }

  // ── Contas a pagar ───────────────────────────────────────────────────────────
  const today = new Date();
  const billsAlert = useMemo(()=>{
    return bills.map(b=>{
      const venc = new Date(today.getFullYear(), today.getMonth(), b.diaVenc);
      if(venc < today) venc.setMonth(venc.getMonth()+1);
      const diffDays = Math.ceil((venc - today)/(1000*60*60*24));
      return {...b, venc, diffDays};
    }).sort((a,b)=>a.diffDays-b.diffDays);
  },[bills]);

  // Contas fixas cadastradas — aparecem como alerta quando faltam ≤5 dias E ainda não pagas este mês
  const fixedBillsAlerts = useMemo(()=>{
    const now = new Date();
    const curMes = now.getMonth();
    const curAno = now.getFullYear();
    return fixedBills.filter(fb=>{
      if(fb.status==="pausada") return false;
      // Verificar se já foi paga este mês
      const jaFoi = expenses.some(e=>
        e.fixedBillId===fb.id &&
        new Date(e.date+"T00:00:00").getMonth()===curMes &&
        new Date(e.date+"T00:00:00").getFullYear()===curAno
      );
      if(jaFoi) return false; // já paga → não aparece no alerta
      // Calcular dias para vencimento
      const venc = new Date(curAno, curMes, fb.diaVenc);
      if(venc < now) venc.setMonth(venc.getMonth()+1);
      const diff = Math.ceil((venc - now)/(1000*60*60*24));
      return diff <= 5; // só aparece quando faltam ≤5 dias
    }).map(fb=>{
      const venc = new Date(now.getFullYear(), now.getMonth(), fb.diaVenc);
      if(venc < now) venc.setMonth(venc.getMonth()+1);
      const diffDays = Math.ceil((venc - now)/(1000*60*60*24));
      return {...fb, venc, diffDays, alertaDias:5, isFixedBill:true};
    });
  },[fixedBills, expenses]);

  // Empréstimos com parcela mensal — aparecem como alerta recorrente
  const debtsBills = useMemo(()=>{
    const now    = new Date();
    const curMes = now.getMonth();
    const curAno = now.getFullYear();
    return debts.filter(d=>{
      if(d.status==="pago") return false;
      if(!d.valorParcela || d.valorParcela<=0) return false;
      if(d.tipo!=="devo") return false;
      if(d.tipoEmprestimo==="normal" && d.parcelasTotal>0 && d.parcelasPagas>=d.parcelasTotal) return false;
      // Verificar se já foi pago este mês (via debtId no expense)
      const jaFoi = expenses.some(e=>
        e.debtId===d.id &&
        new Date(e.date+"T00:00:00").getMonth()===curMes &&
        new Date(e.date+"T00:00:00").getFullYear()===curAno
      );
      // Também verificar via ultimoPagamento
      const jaFoiAlt = d.ultimoPagamento &&
        new Date(d.ultimoPagamento+"T00:00:00").getMonth()===curMes &&
        new Date(d.ultimoPagamento+"T00:00:00").getFullYear()===curAno;
      if(jaFoi||jaFoiAlt) return false; // já pago este mês → não aparece
      // Só aparece quando faltam ≤5 dias para vencer
      const dia  = d.diaVenc||1;
      const venc = new Date(now.getFullYear(), now.getMonth(), dia);
      if(venc < now) venc.setMonth(venc.getMonth()+1);
      const diff = Math.ceil((venc - now)/(1000*60*60*24));
      return diff <= (d.alertaDias||10); // aparece 10 dias antes
    }).map(d=>{
      const dia  = d.diaVenc||1;
      const venc = new Date(today.getFullYear(), today.getMonth(), dia);
      if(venc < today) venc.setMonth(venc.getMonth()+1);
      const diffDays  = Math.ceil((venc - today)/(1000*60*60*24));
      const restantes = d.tipoEmprestimo==="aberto" ? "∞" :
                        d.parcelasTotal>0 ? (d.parcelasTotal - d.parcelasPagas) : "∞";
      return {...d, venc, diffDays, isDebt:true, amount:d.valorParcela,
              alertaDias:d.alertaDias||10, restantes};
    });
  },[debts, expenses]);

  const allAlerts = useMemo(()=>[...billsAlert,...fixedBillsAlerts,...debtsBills].sort((a,b)=>a.diffDays-b.diffDays),[billsAlert,fixedBillsAlerts,debtsBills]);
  const billsVencendo = allAlerts.filter(b=>b.diffDays<=b.alertaDias&&b.diffDays>=0);

  async function pagarContaFixa(fb, mes, ano){
    const jaFoi = expenses.some(e=>
      e.fixedBillId===fb.id &&
      new Date(e.date+"T00:00:00").getMonth()===mes &&
      new Date(e.date+"T00:00:00").getFullYear()===ano
    );
    if(jaFoi){ notify("✓ Esta conta já foi paga neste mês!"); return; }

    let valorFinal = fb.amount;
    // Conta variável → pede o valor real da fatura
    if(fb.modalidade==="variavel"){
      const input = prompt("Valor da conta \""+fb.desc+"\" este mês:\n(Enter para usar "+fmt(fb.amount)+" como estimativa)");
      if(input===null) return; // cancelou
      const digits  = input.replace(/\D/g,"");
      const parsed  = digits ? parseInt(digits,10)/100 : 0;
      if(parsed > 0) valorFinal = parsed;
    }

    if(isCofrinhoPayment(fb.pagamento) && !findCofrinhoInvestment(fb.member)){
      notify("Cadastre um investimento do tipo Cofrinho antes de pagar esta conta com Cofrinho.");
      return;
    }
    if(false && isCreditoPayment(fb.pagamento) && !findCreditoInvestment(fb.member)){
      notify("Conta registrada na fatura do cartão de crédito.");

    setSyncing(true);
    try {
      const tipo    = allBillTypes.find(t=>t.id===fb.tipo)||FIXED_BILL_TYPES[FIXED_BILL_TYPES.length-1];
      const d       = new Date(ano, mes, fb.diaVenc);

      const isCartaoCredito = fb.tipo==="cartao_credito";
      const descPgto = isCartaoCredito
        ? `▣ Fatura ${fb.banco||fb.desc} — ${MONTHS_SHORT[mes]}`
        : `${tipo.icon} ${fb.desc}${fb.modalidade==="variavel"?" (variável)":""}`;
      await addDoc(expCol,{
        desc:           descPgto,
        amount:         valorFinal,
        category:       "conta",

        // Fatura de cartão = débito real (sai da conta, vai pro cartão)
        pagamento:      isCartaoCredito ? "debito" : fb.pagamento,

        isFaturaCartao: isCartaoCredito,
        banco:          fb.banco||"",
        date:           dateStr,
        createdAt:      Date.now(),
      });
      if(isCartaoCredito){
        notify(`✓ Fatura ${fb.banco||fb.desc} paga! ${fmt(valorFinal)} subtraído do saldo.`);
      } else if(isCofrinhoPayment(fb.pagamento)){
        await ajustarSaldoCofrinho(valorFinal, fb.member, "debitar", "conta_fixa_cofrinho");

        notify("✓ "+fb.desc+" registrada na fatura do cartão de crédito.");
      }else{
        notify("✓ "+fb.desc+" paga! "+fmt(valorFinal)+" subtraído do saldo.");
      }
    } catch(e){ notify("Erro ao registrar pagamento: "+(e.message||"verifique o Cofrinho.")); } finally{ setSyncing(false); }
  }

  // Calcula rendimento baseado no CDI do BCB
  function calcRendimento(inv){
    if(!inv.percentualCDI || inv.percentualCDI<=0) return null;
    if(!inv.dataAporte) return null;

    const CDI_ANUAL_FALLBACK = 14.65;
    const cdiAnual  = cdiBcb ? (Math.pow(1 + cdiBcb/100, 252) - 1) * 100 : CDI_ANUAL_FALLBACK;
    const cdiDiario = cdiBcb ? cdiBcb/100 : (Math.pow(1 + CDI_ANUAL_FALLBACK/100, 1/252) - 1);

    // Usa tempo fracionado (horas/minutos) para atualização em tempo real
    const inicio       = new Date(inv.dataAporte+"T00:00:00");
    const msDiff       = agora - inicio;
    const diasFracao   = Math.max(0, msDiff / 86400000); // dias com fração

    const percent   = inv.percentualCDI / 100;
    const fator     = Math.pow(1 + cdiDiario * percent, diasFracao);
    const rendBruto = inv.valor * (fator - 1);

    return {
      rendBruto,
      valorAtual:    inv.valor + rendBruto,
      diasCorridos:  Math.floor(diasFracao),
      diasFracao,
      cdiAnual:      cdiAnual.toFixed(2),
      percentualCDI: inv.percentualCDI,
      taxaEfetiva:   (cdiAnual * inv.percentualCDI / 100).toFixed(2),
      isFallback:    !cdiBcb,
      rendDiario:    inv.valor * cdiDiario * percent, // rendimento por dia
    };
  }

  function tripEndDate(trip){
    const d = new Date((trip.dataInicio||todayISO())+"T00:00:00");
    d.setDate(d.getDate() + Math.max(1, +(trip.dias||1)) - 1);
    return d.toISOString().split("T")[0];
  }
  function tripStats(trip){
    const inicio = trip.dataInicio || todayISO();
    const fim    = tripEndDate(trip);
    const gastos = sortExpensesByDateDesc(expenses.filter(x => x.tripId===trip.id || (!x.tripId && x.date>=inicio && x.date<=fim && x.category==="lazer")));
    const usado  = gastos.reduce((s,x)=>s+x.amount,0);
    const limite = +(trip.limite||0);
    const saldo  = limite - usado;
    const pct    = limite>0 ? Math.min(100, usado/limite*100) : 0;
    return {inicio,fim,gastos,usado,limite,saldo,pct};
  }

  // Pagar parcela do mês — consignado NÃO lança gasto, normal lança gasto
  async function pagarParcelaMes(debt){
    // Bloquear pagamento duplicado no mesmo mês
    const now    = new Date();
    const curMes = now.getMonth();
    const curAno = now.getFullYear();
    const jaFoi  = expenses.some(e=>
      e.debtId===debt.id &&
      new Date(e.date+"T00:00:00").getMonth()===curMes &&
      new Date(e.date+"T00:00:00").getFullYear()===curAno
    );
    if(jaFoi){ notify("✓ Parcela deste mês já foi paga!"); return; }

    setSyncing(true);
    try {
      const novasPagas = debt.parcelasPagas + 1;
      const quitado    = debt.tipoEmprestimo !== "aberto" && debt.parcelasTotal > 0 && novasPagas >= debt.parcelasTotal;

      // Consignado: só registra, NÃO desconta da renda
      if(debt.tipoEmprestimo !== "consignado"){
        await addDoc(expCol,{
          desc:      debt.desc + " (parcela " + novasPagas + (debt.parcelasTotal>0?"/"+debt.parcelasTotal:"") + ")",
          amount:    debt.valorParcela,
          category:  "outros",
          member:    debt.member||"Victor",
          pagamento: debt.pagamento||"dinheiro",
          debtId:    debt.id,
          date:      todayISO(),
          createdAt: Date.now(),
        });
      }

      await updateDoc(doc(db,"families",familyId,"debts",debt.id),{
        parcelasPagas:    novasPagas,
        ultimoPagamento:  todayISO(), // guarda o mês do último pagamento
        status: quitado ? "pago" : "pendente",
      });

      notify(debt.tipoEmprestimo==="consignado"
        ? "Parcela consignada registrada! ✓"
        : "Parcela paga e lançada no gasto! ✓"
      );
    } catch{ notify("Erro ao pagar parcela."); } finally{ setSyncing(false); }
  }

  async function saveEdit(){
    if(!adminGuard("editar lançamentos")) return;
    if(!editItem) return;
    setSyncing(true);
    try {
      const {id, ...rest} = editItem.data;
      const colMap = {
        expense:"expenses", income:"incomes", debt:"debts",
        fin:"financiamentos", acpag:"acpag", fixedbill:"fixedBills",
        investment:"investments",
      };
      const colName = colMap[editItem.type];
      if(!colName){ notify("Tipo não suportado."); return; }

      // Parse all amount fields
      const updated = {...rest};
      if(updated.amount!==undefined)      updated.amount      = parseMasked(String(updated.amount))||updated.amount;
      if(updated.valor!==undefined)       updated.valor       = parseMasked(String(updated.valor))||updated.valor;
      if(updated.valorTotal!==undefined)  updated.valorTotal  = parseMasked(String(updated.valorTotal))||updated.valorTotal;
      if(updated.valorParcela!==undefined)updated.valorParcela= parseMasked(String(updated.valorParcela))||updated.valorParcela;

      if(editItem.type==="expense"){
        const original = expenses.find(x=>x.id===id);
        const oldCofrinho = isCofrinhoPayment(original?.pagamento);
        const newCofrinho = isCofrinhoPayment(updated.pagamento);
        const oldAmount = Number(original?.amount||0);
        const newAmount = Number(updated.amount||0);
        const memberForCofrinho = updated.member || original?.member || "Família";
        if(newCofrinho && !findCofrinhoInvestment(memberForCofrinho)){
          notify("Cadastre um investimento do tipo Cofrinho antes de alterar este gasto para Cofrinho.");
          setSyncing(false);
          return;
        }
        if(oldCofrinho && newCofrinho){
          const delta = +(newAmount - oldAmount).toFixed(2);
          if(delta>0) await ajustarSaldoCofrinho(delta, memberForCofrinho, "debitar");
          if(delta<0) await ajustarSaldoCofrinho(Math.abs(delta), memberForCofrinho, "creditar");
        }else if(!oldCofrinho && newCofrinho){
          await ajustarSaldoCofrinho(newAmount, memberForCofrinho, "debitar");
        }else if(oldCofrinho && !newCofrinho){
          try{ await ajustarSaldoCofrinho(oldAmount, original?.member||memberForCofrinho, "creditar"); }catch{}
        }

        const oldCredito = isCreditoPayment(original?.pagamento);
        const newCredito = isCreditoPayment(updated.pagamento);
        const memberForCredito = updated.member || original?.member || "Família";
        if(oldCredito && newCredito){
          const delta = +(newAmount - oldAmount).toFixed(2);
          if(delta>0) await ajustarSaldoCredito(delta, memberForCredito, "debitar", "editar_gasto_credito");
          if(delta<0) await ajustarSaldoCredito(Math.abs(delta), memberForCredito, "creditar", "editar_gasto_credito");
        }else if(!oldCredito && newCredito){
          await ajustarSaldoCredito(newAmount, memberForCredito, "debitar", "alterar_para_credito");
        }else if(oldCredito && !newCredito){
          try{ await ajustarSaldoCredito(oldAmount, original?.member||memberForCredito, "creditar", "remover_credito_do_gasto"); }catch{}
        }
      }

      await updateDoc(doc(db,"families",familyId,colName,id), updated);
      setEditItem(null);
      logActivity("Editou item", editItem?.type || "Item atualizado", "Edição"); notify("Atualizado com sucesso! ✓");
    } catch(e){ notify("Erro ao atualizar: "+e.message); } finally{ setSyncing(false); }
  }

  function gerarRelatorio(mStart, mEnd, membro){
    setShowExportModal(false);
    setExporting(true);
    notify("Gerando relatório... ▤");
    setTimeout(()=>{
      const memberOk = x => membro==="Família" || x.member===membro;

      let expFilt, incFilt, periodLabel, nMeses;

      if(exportMode==="diario"){
        // Filtro por data específica
        const dStart = new Date(exportDateStart+"T00:00:00");
        const dEnd   = new Date(exportDateEnd+"T23:59:59");
        const inRange = x => {
          const d = new Date(x.date+"T00:00:00");
          return d >= dStart && d <= dEnd;
        };
        expFilt = sortExpensesByDateDesc(expenses.filter(e=>memberOk(e)&&inRange(e)));
        // No relatório diário, a renda usada como referência vem do(s) mês(es) do período selecionado.
        // Assim, mesmo em um passeio de um único dia, o relatório mostra a renda do mês para comparação.
        const monthStart = new Date(exportDateStart+"T00:00:00");
        const monthEnd   = new Date(exportDateEnd+"T00:00:00");
        incFilt = incomes.filter(i=>{
          if(!memberOk(i)) return false;
          const d = new Date(i.date+"T00:00:00");
          return d >= new Date(monthStart.getFullYear(), monthStart.getMonth(), 1)
              && d <= new Date(monthEnd.getFullYear(), monthEnd.getMonth()+1, 0, 23, 59, 59);
        });
        const isSameDay = exportDateStart===exportDateEnd;
        periodLabel = isSameDay
          ? fmtDate(exportDateStart)
          : fmtDate(exportDateStart)+" até "+fmtDate(exportDateEnd);
        nMeses = Math.max(1, Math.ceil((dEnd-dStart)/(1000*60*60*24*30)));
      } else {
        // Filtro por mês
        const inRange = x => {
          const m = new Date(x.date+"T00:00:00").getMonth();
          return m >= mStart && m <= mEnd;
        };
        expFilt = sortExpensesByDateDesc(expenses.filter(e=>memberOk(e)&&inRange(e)));
        incFilt = incomes.filter(i=>memberOk(i)&&inRange(i));
        periodLabel = mStart===mEnd ? MONTHS[mStart] : MONTHS[mStart]+" – "+MONTHS[mEnd];
        nMeses = mEnd - mStart + 1;
      }

      if(exportCategory!=="todos") expFilt = expFilt.filter(e=>e.category===exportCategory);
      if(exportPayment!=="todos")  expFilt = expFilt.filter(e=>e.pagamento===exportPayment);

      const byCat = {};
      expFilt.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount;});
      const tExp = expFilt.reduce((s,e)=>s+e.amount,0);
      const tInc = incFilt.reduce((s,i)=>s+i.amount,0);
      const debtsFilt = debts.filter(d=>memberOk(d)&&d.tipo==="devo"&&d.status!=="pago"&&d.valorParcela>0&&d.tipoEmprestimo!=="consignado");
      const finsFilt  = fins.filter(f=>memberOk(f)&&f.status==="ativo"&&f.valorParcela>0);

      exportReport({
        expenses:expFilt, incomes:incFilt,
        filterMonth:mEnd, filterMember:membro,
        byCategory:byCat, totalExp:tExp, totalInc:tInc, goals,
        periodLabel, nMeses, debtsFilt, finsFilt, reportMode: exportMode,
        reportFilters:{categoria:exportCategory,pagamento:exportPayment},
        incomeReferenceLabel: exportMode==="diario" ? "Renda mensal de referência" : "Renda do período",
      });
      setExporting(false);
      notify("Relatório aberto! Ctrl+P para salvar PDF ✓");
    },400);
  }

ReactDOM.createRoot(document.getElementById("root")).render(e(Root));

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js")
      .then(reg=>{
        // Verifica atualizações a cada 30 minutos
        setInterval(()=> reg.update(), 30 * 60 * 1000);

        // Nova versão encontrada → ativa imediatamente
        reg.addEventListener("updatefound", ()=>{
          const nw = reg.installing;
          if(!nw) return;
          nw.addEventListener("statechange", ()=>{
            if(nw.state === "installed" && navigator.serviceWorker.controller){
              // Ativa o novo SW sem precisar fechar o app
              nw.postMessage("skipWaiting");
            }
          });
        });

        // Quando o novo SW assume o controle → recarrega a página silenciosamente
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", ()=>{
          if(refreshing) return;
          refreshing = true;
          // Nova versão ativada: recarrega automaticamente para aplicar atualização
          window.location.reload();
        });
      })
      .catch(()=>{});
  });
}

// Captura o evento de instalação PWA (Android/Chrome)
let _deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", ev => {
  ev.preventDefault();
  _deferredInstallPrompt = ev;
  window._deferredInstallPrompt = ev; // garante acesso global
  window.dispatchEvent(new CustomEvent("pwa-installable"));
});

// Se o evento já foi capturado antes do React montar
if(_deferredInstallPrompt){
  window._deferredInstallPrompt = _deferredInstallPrompt;
}
</script>
  


<script id="laviapp-free-cadastro-direto">
(function(){
  if(window.__laviappFreeCadastroDireto) return;
  window.__laviappFreeCadastroDireto = true;

  function isFreeUrl(){
    return location.search.toLowerCase().includes("plano=free");
  }

  function salvarFree(){
    if(!isFreeUrl()) return;
    try{
      localStorage.setItem("laviapp-plano","free");
      localStorage.setItem("laviapp-plano-selecionado","free");
      localStorage.setItem("laviapp-plano-free-ativo","1");
      localStorage.setItem("laviapp-free-criar-familia","1");
      localStorage.setItem("laviapp-plano-free-inicio", localStorage.getItem("laviapp-plano-free-inicio") || new Date().toISOString());
    }catch(e){}
  }

  function norm(t){
    return String(t||"").normalize("NFD").replace(/[\\u0300-\\u036f]/g,"").toLowerCase();
  }

  function abrirCadastroSeAindaEstiverLogin(){
    if(!isFreeUrl()) return;
    const body = norm(document.body.innerText || "");
    if(body.includes("nao tem conta") || body.includes("não tem conta") || body.includes("criar conta")){
      const btns = Array.from(document.querySelectorAll("button,a"));
      const btn = btns.find(el => norm(el.textContent).includes("criar conta"));
      if(btn) btn.click();
    }
  }

  function bloquearPdf(){
    const plano = String(localStorage.getItem("laviapp-plano")||"").toLowerCase();
    if(plano !== "free") return;

    document.querySelectorAll("button,a").forEach(function(el){
      if(el.dataset.freePdfBlock) return;
      const txt = norm((el.textContent||"")+" "+(el.title||"")+" "+(el.getAttribute("aria-label")||""));
      if(txt.includes("pdf") || txt.includes("exportar")){
        el.dataset.freePdfBlock = "1";
        el.addEventListener("click", function(ev){
          ev.preventDefault();
          ev.stopPropagation();
          alert("Relatório PDF não está disponível no Plano Free.");
        }, true);
      }
    });
  }

  function run(){
    salvarFree();
    abrirCadastroSeAindaEstiverLogin();
    bloquearPdf();
    setTimeout(function(){salvarFree();abrirCadastroSeAindaEstiverLogin();bloquearPdf();}, 700);
    setTimeout(function(){salvarFree();abrirCadastroSeAindaEstiverLogin();bloquearPdf();}, 1600);
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", run, {once:true});
  else run();
})();
</script>
